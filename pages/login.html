<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <title>Sign In — Asilia Onboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="shared/styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: var(--bgcard);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      font-family: var(--serif);
      font-size: 38px;
      color: var(--gold);
      letter-spacing: -1px;
      margin-bottom: 4px;
    }
    .logo-sub {
      font-size: 10px;
      color: var(--fg3);
      letter-spacing: 3px;
      margin-bottom: 32px;
    }
    .page-title {
      font-family: var(--serif);
      font-size: 22px;
      margin-bottom: 6px;
    }
    .page-sub {
      font-size: 12px;
      color: var(--fg3);
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .spin {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .btn.loading .spin { display: block; }
    .btn.loading .btxt { opacity: 0.6; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">Asilia</div>
      <div class="logo-sub">ONBOARDING SUITE</div>

      <div class="page-title">Welcome back</div>
      <div class="page-sub">Sign in with your Asilia Homes account.<br/>Landlords and agents only.</div>

      <form id="loginForm">
        <div class="fgrp">
          <label class="label" for="emailInput">Email address</label>
          <input class="input" id="emailInput" type="email" placeholder="you@example.com" autocomplete="email" required/>
        </div>

        <div class="fgrp">
          <label class="label" for="pwInput">Password</label>
          <input class="input" id="pwInput" type="password" placeholder="••••••••" autocomplete="current-password" required/>
        </div>

        <div class="err" id="loginErr"></div>

        <button type="submit" class="btn" id="loginBtn" style="width:100%;justify-content:center;margin-top:8px;padding:13px;">
          <span class="btxt">Sign In</span>
          <div class="spin"></div>
        </button>
      </form>

      <div style="font-size:11px;color:var(--fg3);margin-top:24px;text-align:center;">
        Need an account? <a href="https://asilia.homes" style="color:var(--gold);text-decoration:none;" target="_blank">Sign up at asilia.homes →</a>
      </div>
    </div>
  </div>

  <script>
    var SUPABASE_URL = 'https://lwsxjmowjvazoqbaizjr.supabase.co'
    var SUPABASE_ANON_KEY = 'sb_publishable_bWjhlmrvLi9B66qZHnA2cA_NesgU_Ob'
    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    sb.auth.getSession().then(function(res) {
      if (res.data && res.data.session) {
        window.location.href = 'dashboard.html'
      }
    })

    var loginErr = document.getElementById('loginErr')
    var loginBtn = document.getElementById('loginBtn')

    function setLoading(v) {
      if (v) {
        loginBtn.classList.add('loading')
        loginBtn.disabled = true
      } else {
        loginBtn.classList.remove('loading')
        loginBtn.disabled = false
      }
    }

    document.getElementById('loginForm').onsubmit = async function(e) {
      e.preventDefault()
      loginErr.textContent = ''
      var email = document.getElementById('emailInput').value.trim()
      var pw = document.getElementById('pwInput').value
      if (!email || !pw) {
        loginErr.textContent = 'Please enter your email and password.'
        return
      }
      setLoading(true)
      var { data, error } = await sb.auth.signInWithPassword({ email: email, password: pw })
      if (error) {
        loginErr.textContent = error.message || 'Sign in failed. Please check your credentials.'
        setLoading(false)
        return
      }
      var userId = data.user.id
      var { data: profile, error: profErr } = await sb.from('profiles').select('role').eq('id', userId).maybeSingle()
      if (profErr || !profile) {
        loginErr.textContent = 'Could not load your profile. Please try again.'
        await sb.auth.signOut()
        setLoading(false)
        return
      }
      if (profile.role !== 'landlord' && profile.role !== 'agent') {
        loginErr.textContent = 'This tool is for landlords and agents only.'
        await sb.auth.signOut()
        setLoading(false)
        return
      }
      window.location.href = 'dashboard.html'
    }
  </script>
</body>
</html>
